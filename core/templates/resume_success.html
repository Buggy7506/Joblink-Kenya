<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume Submitted</title>
    <style>
        :root {
            --bg-main: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --bg-card: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-accent: #00c6ff;
            --text-inverse: #0f2027;
            --glow-accent: rgba(0, 198, 255, 0.45);
            --bg-info: #0072ff;
            --bg-info-hover: #005fe0;
        }

        body {
            background: var(--bg-main);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-main);
            margin: 0;
        }

        .container {
            text-align: center;
            background: var(--bg-card);
            padding: 50px 60px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 28px var(--glow-accent);
            border: 1px solid rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(12px);
            animation: fadeIn 1s ease-out;
        }

        h1 { color: var(--text-accent); font-size: 3rem; margin-bottom: 20px; }
        p { font-size: 1.3rem; margin-bottom: 40px; line-height: 1.5; }

        a {
            display: inline-block;
            background: linear-gradient(45deg, var(--text-accent), var(--bg-info));
            color: #fff;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s ease, background 0.3s ease;
        }

        a:hover { background: var(--bg-info-hover); transform: scale(1.04); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Resume Submitted!</h1>
        <p>Thank you for submitting your resume. Our team will review it and get back to you shortly.</p>
        <a href="{% url 'dashboard' %}">Back to Dashboard</a>
    </div>
</body>
</html>
