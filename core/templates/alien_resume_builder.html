{% extends "base.html" %}
{% load static %}

{% block title %}Alien Design Studio{% endblock %}

{% block content %}
<section class="design-shell" aria-label="Alien Design Studio">
  <aside class="studio-sidebar">
    <h1>Alien Design Studio</h1>
    <p>Build social posts, resumes, and banners without leaving Joblink.</p>

    <div class="tool-group" role="group" aria-label="Design tools">
      <button class="tool-btn is-active" data-tool="select" type="button">Select</button>
      <button class="tool-btn" data-tool="draw" type="button">Draw</button>
      <button class="tool-btn" data-tool="text" type="button">Text</button>
      <button class="tool-btn" data-tool="rect" type="button">Rectangle</button>
      <button class="tool-btn" data-tool="circle" type="button">Circle</button>
    </div>

    <label class="control-label" for="colorPicker">Color</label>
    <input id="colorPicker" type="color" value="#5b7cfa" />

    <label class="control-label" for="fontSize">Font size</label>
    <input id="fontSize" type="range" min="14" max="96" value="34" />

    <label class="control-label" for="uploadImage">Upload image</label>
    <input id="uploadImage" type="file" accept="image/*" />

    <div class="action-group">
      <button id="undoBtn" type="button">Undo</button>
      <button id="redoBtn" type="button">Redo</button>
      <button id="duplicateBtn" type="button">Duplicate</button>
      <button id="deleteBtn" type="button">Delete</button>
      <button id="downloadBtn" type="button">Export PNG</button>
    </div>

    <h2>Layers</h2>
    <ol id="layerList" class="layer-list" aria-live="polite"></ol>
  </aside>

  <div class="studio-main">
    <header class="studio-topbar">
      <button class="preset-btn" data-preset="resume" type="button">Resume</button>
      <button class="preset-btn" data-preset="instagram" type="button">Instagram</button>
      <button class="preset-btn" data-preset="linkedin" type="button">LinkedIn Banner</button>
      <button class="preset-btn" data-preset="presentation" type="button">Presentation</button>
      <span id="statusBadge" class="status-badge">Ready</span>
    </header>

    <div class="canvas-wrapper">
      <canvas id="designCanvas" width="1080" height="1080" aria-label="Design canvas"></canvas>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.1/dist/fabric.min.js" defer></script>
<script src="{% static 'js/canva_clone.js' %}" defer></script>
<link rel="stylesheet" href="{% static 'css/canva_clone.css' %}" />
{% endblock %}
