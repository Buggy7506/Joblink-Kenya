<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Confirm Alert Deletion</title>
  <style>
    :root {
      --bg-main: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      --bg-card: rgba(255, 255, 255, 0.12);
      --text-main: #ffffff;
      --text-muted: #d7e5ec;
      --text-accent: #00c6ff;
      --text-warning: #ffd166;
      --text-danger: #ff7a7a;
      --text-inverse: #0f2027;
      --bg-danger: #ef5a5a;
      --bg-danger-hover: #d94343;
      --glow-accent: rgba(0, 198, 255, 0.4);
    }

    body {
      background: var(--bg-main);
      color: var(--text-main);
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.28);
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 20px var(--glow-accent);
      text-align: center;
      width: 90%;
      max-width: 400px;
      backdrop-filter: blur(12px);
    }

    h2 { font-size: 28px; color: var(--text-danger); margin-bottom: 20px; }
    p { font-size: 15px; color: var(--text-muted); margin-bottom: 30px; }
    .alert-title { color: var(--text-warning); font-weight: bold; }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s ease-in-out;
      text-align: center;
    }

    .btn-delete { background: var(--bg-danger); color: #fff; }
    .btn-delete:hover { background: var(--bg-danger-hover); }
    .btn-cancel { background: transparent; color: var(--text-accent); text-decoration: underline; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>⚠️ Confirm Delete</h2>
    <p>
      Are you sure you want to delete the job alert
      <span class="alert-title">"{{ alert.job_title }}"</span>?
      <br>This action cannot be undone.
    </p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-delete">Yes, Delete</button>
      <a href="{% url 'job_alerts' %}" class="btn btn-cancel">No, take me back</a>
    </form>
  </div>
</body>
</html>
