name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: joblink
          POSTGRES_PASSWORD: password
          POSTGRES_DB: joblink_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U joblink"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Set up Node.js for Playwright
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # 3️⃣ Install Node dependencies
      - name: Install Node dependencies
        run: npm ci

      # 4️⃣ Install Playwright browsers with dependencies
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # 5️⃣ Set up Python for Django
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 6️⃣ Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 7️⃣ Run Django migrations
      - name: Run Django migrations
        run: python manage.py migrate

      # 8️⃣ Run Playwright tests (Playwright manages the Django webServer lifecycle)
      - name: Run Playwright tests
        run: npx playwright test --config=playwright.config.ts

      # 🔟 Upload Playwright HTML report
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # 11️⃣ Upload Playwright screenshots
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: screenshots
          path: test-results/
          retention-days: 30
